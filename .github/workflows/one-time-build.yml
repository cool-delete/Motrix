name: 构建 Windows 安装包

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: 安装依赖
      run: npm install --legacy-peer-deps
    
    - name: 构建项目
      run: node .electron-vue/build.js
    
    - name: 打包 Windows 安装包
      run: npx electron-builder --win --x64 --publish never
    
    - name: 列出生成文件
      run: |
        Get-ChildItem release -Recurse -Filter *.exe | Format-Table FullName
        Get-ChildItem release -Recurse -Filter *.msi | Format-Table FullName
    
    - name: 上传安装包
      uses: actions/upload-artifact@v4
      with:
        name: Motrix-Windows-Installer
        path: |
          release/**/*.exe
          release/**/*.msi
        retention-days: 90
