name: 一次性构建 Windows 安装包

on:
  workflow_dispatch:  # 仅手动触发，构建一次后就不再运行

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 安装 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 安装依赖
      run: |
        npm install
        
    - name: 构建 Windows 安装包
      run: |
        npx electron-builder --win --x64
        
    - name: 上传安装包
      uses: actions/upload-artifact@v4
      with:
        name: Motrix-Windows-安装包
        path: dist/*.exe
