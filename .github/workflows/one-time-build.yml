name: 【仅一次】构建 Windows 安装包

on:
  workflow_dispatch:

jobs:
  build-windows-only:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 安装依赖
      run: npm install --legacy-peer-deps

    - name: 编译项目
      run: npm run build:github
      # 或者使用：node .electron-vue/build.js

    - name: 打包 Windows 安装包
      run: npx electron-builder --win --x64 --publish never

    - name: 上传成品
      uses: actions/upload-artifact@v4
      with:
        name: Motrix-WIN-Only
        path: dist/*.exe
        retention-days: 90
